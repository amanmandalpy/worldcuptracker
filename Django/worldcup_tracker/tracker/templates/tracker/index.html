<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0f172a;
        }

        .title{
            color:white;
            font-weight:bold;
            text-align:center;
            margin:40px 0;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,.2);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .round{
            font-size:14px;
            font-weight:bold;
            color:#0d6efd;
        }

        .team{
            font-size:20px;
            font-weight:bold;
        }

        .score{
            font-size:24px;
            color:#198754;
            font-weight:bold;
        }

        .date{
            color:#6c757d;
        }
    </style>

</head>
<body>

<div class="container">

    <h1 class="title">
        🏆 FIFA WORLD CUP 2026 TRACKER
    </h1>

    <div class="row">

        {% for match in matches %}

        <div class="col-lg-6 mb-4">

            <div class="card">

                <div class="card-body">

                    <div class="round">
                        {{ match.round }}
                    </div>

                    <hr>

                    <h5 class="team">

                        {{ match.team1 }}

                        <br>

                        <span class="text-secondary">
                            VS
                        </span>

                        <br>

                        {{ match.team2 }}

                    </h5>

                    <p class="date">

                        📅 {{ match.date }}

                    </p>

                    <h4 class="score">

                        {{ match.formatted_score }}

                    </h4>

                    <span class="badge bg-dark">

                        Match No. {{ match.num }}

                    </span>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
